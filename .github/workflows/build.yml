name: Build ExitFix

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download MinHook
      run: |
        curl -L https://github.com/TsudaKageyu/minhook/releases/download/v1.3.3/minhook_133_bin.zip -o minhook.zip
        7z x minhook.zip -ominhook

    - name: List MinHook contents
      run: dir minhook /s

    - name: Copy MinHook files
      run: |
        copy minhook\include\MinHook.h MinHook.h
        copy minhook\lib\libMinHook.x86.lib libMinHook.x86.lib

    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -A Win32
        cmake --build . --config Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ExitFix
        path: build/Release/ExitFix.asi
